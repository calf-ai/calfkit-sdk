name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: |
          if [ "${{ matrix.python-version }}" = "3.10" ]; then
            uv run pytest tests/ -v --tb=short --cov=calfkit --cov-report=term-missing --cov-report=xml
          else
            uv run pytest tests/ -v --tb=short
          fi
        env:
          OPENAI_API_KEY: ${{
            (github.event_name == 'push' ||
             contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'),
                      github.event.pull_request.author_association))
            && secrets.OPENAI_API_KEY || '' }}
          TEST_LLM_MODEL_NAME: ${{ vars.TEST_LLM_MODEL_NAME }}
          TEST_REASONING_EFFORT: ${{ vars.TEST_REASONING_EFFORT }}

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
