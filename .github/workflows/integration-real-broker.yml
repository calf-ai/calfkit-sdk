name: "Integration: real broker"

# Runs the general real-broker integration lane: every test marked
# `@pytest.mark.kafka` (selected with `-m kafka`) -- broker round-trips and MCP
# capability discovery. The broker is a single-node Redpanda started and torn
# down by testcontainers from inside the test session, so -- unlike the topic
# provisioning lane in `integration-topic-provisioning.yml`, which hand-runs a
# broker with topic auto-create DISABLED -- this job needs no manual broker
# bring-up; the GitHub-hosted runner's Docker daemon is the only prerequisite.
#
# These tests are deselected from the default suite (see `addopts` in
# pyproject.toml), so `ci.yml` never needs Docker. Push-to-main runs
# unconditionally as a post-merge safety net; PRs run only when relevant paths
# change (a Docker image pull per run is not free).
#
# Uses no untrusted-input context vars in run: steps; only static commands.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "calfkit/**"
      - "tests/integration/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/integration-real-broker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-broker:
    name: Real broker (testcontainers Redpanda)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # `integration` adds testcontainers; `dev` provides pytest et al.
      - name: Set up Python and dependencies
        uses: ./.github/actions/setup
        with:
          python-version: "3.12"
          groups: "dev integration"

      - name: Run real-broker tests
        # testcontainers starts/stops Redpanda using the runner's Docker daemon;
        # `-m kafka` overrides the default `-m "not kafka"` deselection.
        run: uv run pytest -m kafka -v --tb=short --timeout=180
