name: CI

# Unified CI lane for the always-on checks that share the push-to-main / PR
# trigger and need no special infrastructure: lint + type-check, the offline
# test matrix, and a package build + cross-OS install verification. Lanes with
# divergent triggers or infra stay in their own files: the real-broker, topic-
# provisioning, and live-LLM integration lanes; security; release; pr-title.
# Shared Python+uv setup is factored into .github/actions/setup.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python and dependencies
        uses: ./.github/actions/setup
        with:
          python-version: "3.10"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy calfkit/

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python and dependencies
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        # The default suite is fully offline (FunctionModel + in-memory
        # TestKafkaBroker) and deselects the opt-in `kafka` and `live` lanes
        # (ADR 0007), so it needs no Docker, network, or credentials. The live
        # model-API lane runs separately on push-to-main (integration-live.yml).
        run: |
          if [ "${{ matrix.python-version }}" = "3.10" ]; then
            uv run pytest tests/ -v --tb=short --cov=calfkit --cov-report=term-missing --cov-report=xml
          else
            uv run pytest tests/ -v --tb=short
          fi

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python and uv
        uses: ./.github/actions/setup
        with:
          python-version: "3.10"
          groups: "" # `uv build` needs no synced venv

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  verify:
    name: Verify install • ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest # Linux x64
          - macos-15-intel # macOS Intel
          - macos-latest # macOS Apple Silicon
          - windows-latest # Windows x64

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: pip install dist/*.whl
        shell: bash

      - name: Verify import
        run: python -c "import calfkit; print(f'calfkit {calfkit.__version__} installed successfully')"
