name: CI

# Unified CI lane for the always-on checks that share the push-to-main / PR
# trigger: lint + type-check, the test matrix, and a package build + cross-OS
# install verification. The coverage entry (Python 3.10) additionally runs the
# real-broker `kafka` lane via testcontainers Redpanda, so the uploaded coverage
# is the union of the offline and real-broker tests — which is why that entry
# needs the runner's Docker daemon. Lanes with divergent triggers or infra stay
# in their own files: the topic-provisioning and live-LLM integration lanes;
# security; release; pr-title. Shared Python+uv setup is factored into
# .github/actions/setup.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python and dependencies
        uses: ./.github/actions/setup
        with:
          python-version: "3.10"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy calfkit/

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python and dependencies
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          # `integration` adds testcontainers for the real-broker lane the
          # coverage entry runs; unused (harmless) on the offline-only entries.
          groups: "dev integration"

      - name: Run tests
        # Non-coverage entries run the offline suite only (FunctionModel +
        # in-memory TestKafkaBroker; the default `-m "not kafka and not live"`),
        # needing no Docker, network, or credentials. The coverage entry (3.10)
        # also runs the real-broker `kafka` lane (Redpanda via testcontainers,
        # ADR 0007) as a SECOND pytest run whose coverage is appended
        # (`--cov-append`) to the offline run's, so the uploaded number stays the
        # union of both. That kafka run is parallel (`-n auto` on ONE shared
        # broker) and scoped to `tests/integration` so the xdist controller
        # registers the shared-broker hook (see tests/integration/conftest.py).
        # Broker size/worker count are env-tunable (CALF_TEST_REDPANDA_SMP/_MEMORY,
        # KAFKA_XDIST) if a runner contends. The live lane runs separately
        # (integration-live.yml).
        run: |
          if [ "${{ matrix.python-version }}" = "3.10" ]; then
            uv run pytest tests/ -m "not kafka and not live" --tb=short --timeout=180 \
              --cov=calfkit --cov-report=
            uv run --group integration pytest tests/integration -m kafka -n auto --tb=short --timeout=180 \
              --cov=calfkit --cov-append --cov-report=term-missing --cov-report=xml
          else
            uv run pytest tests/ -v --tb=short
          fi

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python and uv
        uses: ./.github/actions/setup
        with:
          python-version: "3.10"
          groups: "" # `uv build` needs no synced venv

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  verify:
    name: Verify install • ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest # Linux x64
          - macos-15-intel # macOS Intel
          - macos-latest # macOS Apple Silicon
          - windows-latest # Windows x64

    steps:
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: pip install dist/*.whl
        shell: bash

      - name: Verify import
        run: python -c "import calfkit; print(f'calfkit {calfkit.__version__} installed successfully')"
