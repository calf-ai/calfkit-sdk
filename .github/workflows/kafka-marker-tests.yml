name: Integration (kafka-marker lane)

# Runs the real-broker integration lane: every test marked `@pytest.mark.kafka`
# (selected with `-m kafka`). The broker is a single-node Redpanda started and
# torn down by testcontainers from inside the test session, so -- unlike the
# provisioning lane in `kafka-integration.yml`, which hand-runs a broker with
# topic auto-create DISABLED -- this job needs no manual broker bring-up; the
# GitHub-hosted runner's Docker daemon is the only prerequisite.
#
# These tests are deselected from the default suite (see `addopts` in
# pyproject.toml), so `test.yml` never needs Docker. Push-to-main runs
# unconditionally as a post-merge safety net; PRs run only when relevant paths
# change (a Docker image pull per run is not free).
#
# Uses no untrusted-input context vars in run: steps; only static commands.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "calfkit/**"
      - "tests/integration/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/kafka-marker-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kafka-marker:
    name: Real broker (testcontainers Redpanda)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        # `integration` adds testcontainers; `dev` provides pytest et al.
        run: uv sync --group dev --group integration

      - name: Run real-broker tests
        # testcontainers starts/stops Redpanda using the runner's Docker daemon;
        # `-m kafka` overrides the default `-m "not kafka"` deselection.
        run: uv run pytest -m kafka -v --tb=short --timeout=180
